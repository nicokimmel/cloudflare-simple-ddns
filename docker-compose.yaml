services:
  cloudflare-simple-ddns:
    build: .
    container_name: cloudflare-simple-ddns
    restart: unless-stopped
    user: "1000:1000"
    environment:
      TZ: Europe/Berlin
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      RUN_INTERVAL: ${RUN_INTERVAL}
    volumes:
      - ./config/domains.json:/config/domains.json:ro
